<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#080C08" />
    <meta name="description" content="FOFA — Football Open For All. The game belongs to everyone who has ever loved it." />
    <meta property="og:title" content="FOFA — Football Open For All" />
    <meta property="og:description" content="Football is the language between us." />
    <meta property="og:type" content="website" />
    <title>FOFA — Football Open For All</title>
    <style>
      /* ============================================================
         GLOBAL MOBILE RESPONSIVE FIXES
         These override inline styles for mobile devices
         ============================================================ */
      
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      html, body {
        overflow-x: hidden;
        max-width: 100vw;
      }
      
      /* MOBILE: phones and small tablets */
      @media (max-width: 768px) {
        /* Force all text to be readable on mobile */
        h1 {
          font-size: clamp(36px, 10vw, 64px) !important;
          line-height: 1.05 !important;
          letter-spacing: -0.02em !important;
        }
        
        h2 {
          font-size: clamp(28px, 7vw, 48px) !important;
          line-height: 1.1 !important;
        }
        
        h3 {
          font-size: clamp(20px, 5vw, 28px) !important;
        }
        
        p {
          font-size: clamp(15px, 4vw, 18px) !important;
          line-height: 1.6 !important;
        }
        
        /* Fix oversized display fonts */
        [style*="font-size: 96px"],
        [style*="fontSize: 96"],
        [style*="font-size: 84px"],
        [style*="fontSize: 84"],
        [style*="font-size: 72px"],
        [style*="fontSize: 72"],
        [style*="font-size: 64px"],
        [style*="fontSize: 64"] {
          font-size: clamp(40px, 11vw, 64px) !important;
          line-height: 1.05 !important;
        }
        
        /* Force single-column layout for grids/flex on mobile */
        [style*="grid-template-columns"][style*="1fr 1fr"],
        [style*="gridTemplateColumns"][style*="1fr 1fr"] {
          grid-template-columns: 1fr !important;
        }
        
        /* Most multi-column grids should stack */
        [style*="grid-template-columns: repeat"],
        [style*="gridTemplateColumns: repeat"] {
          grid-template-columns: 1fr !important;
          gap: 16px !important;
        }
        
        /* Two-column flex layouts should stack */
        [style*="display: flex"][style*="gap: 64"],
        [style*="display: flex"][style*="gap: 48"],
        [style*="display: flex"][style*="gap: 40"] {
          flex-direction: column !important;
          gap: 24px !important;
        }
        
        /* Reduce excessive padding */
        [style*="padding: 80px"],
        [style*="padding: 96px"],
        [style*="padding: 120px"] {
          padding: 40px 20px !important;
        }
        
        [style*="padding: 64px"],
        [style*="padding: 72px"] {
          padding: 32px 20px !important;
        }
        
        /* Section containers - reduce horizontal padding */
        section {
          padding-left: 20px !important;
          padding-right: 20px !important;
        }
        
        /* Max widths that may be too wide */
        [style*="max-width: 1200"],
        [style*="maxWidth: 1200"],
        [style*="max-width: 1100"],
        [style*="maxWidth: 1100"],
        [style*="max-width: 1000"],
        [style*="maxWidth: 1000"] {
          max-width: 100% !important;
        }
        
        /* Two-column article layouts - stack them */
        [style*="grid-template-columns: 1fr 1fr"] > *,
        [style*="gridTemplateColumns: '1fr 1fr'"] > * {
          max-width: 100% !important;
          width: 100% !important;
        }
        
        /* Fix text container widths */
        [style*="max-width: 620"],
        [style*="maxWidth: 620"],
        [style*="max-width: 720"],
        [style*="maxWidth: 720"] {
          max-width: 100% !important;
        }
        
        /* Make sure article/text blocks don't overflow */
        article, .prose {
          max-width: 100% !important;
          width: 100% !important;
        }
        
        /* Fix blockquotes and side content */
        blockquote {
          margin-left: 0 !important;
          margin-right: 0 !important;
          max-width: 100% !important;
        }
        
        /* Navigation */
        nav {
          padding: 12px 16px !important;
        }
        
        /* CTAs should be full-width on mobile */
        [class*="cta"], .cta, .cta-ghost {
          display: inline-flex !important;
          width: auto !important;
          padding: 14px 24px !important;
          font-size: 13px !important;
        }
        
        /* Flex wraps for button groups */
        [style*="display: flex"][style*="gap: 16"] {
          flex-wrap: wrap !important;
        }
        
        /* Fix images and SVGs */
        img, svg {
          max-width: 100% !important;
          height: auto !important;
        }
        
        /* Reduce font-size on monospace labels */
        [style*="font-family: 'DM Mono'"],
        [style*="fontFamily: 'DM Mono'"] {
          font-size: 10px !important;
        }
        
        /* Fix section spacing */
        section {
          margin-bottom: 40px !important;
        }
      }
      
      /* EXTRA SMALL: older/small phones */
      @media (max-width: 380px) {
        h1 {
          font-size: clamp(32px, 9vw, 48px) !important;
        }
        
        [style*="padding: 40px 20px"] {
          padding: 32px 16px !important;
        }
      }
      
      /* TABLET */
      @media (min-width: 769px) and (max-width: 1024px) {
        h1 {
          font-size: clamp(48px, 8vw, 72px) !important;
        }
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
      }
      
      /* Prevent text selection on UI elements */
      button, nav {
        -webkit-user-select: none;
        user-select: none;
      }
    </style>
  </head>
  <body style="margin:0;background:#080C08;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
