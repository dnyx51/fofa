<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#080C08" />
    <meta name="description" content="FOFA — Football Open For All. The game belongs to everyone who has ever loved it." />
    <meta property="og:title" content="FOFA — Football Open For All" />
    <meta property="og:description" content="Football is the language between us." />
    <meta property="og:type" content="website" />
    <title>FOFA — Football Open For All</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html, body { overflow-x: hidden; max-width: 100vw; }
      
      @media (max-width: 768px) {
        h1, h1 * { font-size: clamp(32px, 9vw, 56px) !important; line-height: 1.05 !important; letter-spacing: -0.02em !important; }
        h2, h2 * { font-size: clamp(24px, 6.5vw, 40px) !important; line-height: 1.1 !important; }
        h3, h3 * { font-size: clamp(18px, 4.5vw, 24px) !important; }
        p { font-size: clamp(15px, 4vw, 18px) !important; line-height: 1.6 !important; }
        
        [style*="font-size: 96"], [style*="fontSize: 96"],
        [style*="font-size: 84"], [style*="fontSize: 84"],
        [style*="font-size: 72"], [style*="fontSize: 72"],
        [style*="font-size: 64"], [style*="fontSize: 64"],
        [style*="font-size: 56"], [style*="fontSize: 56"] {
          font-size: clamp(32px, 9vw, 52px) !important;
          line-height: 1.05 !important;
        }
        
        [style*="font-size: 48"], [style*="fontSize: 48"],
        [style*="font-size: 42"], [style*="fontSize: 42"] {
          font-size: clamp(28px, 7vw, 42px) !important;
        }
        
        /* LOGO FIX */
        svg { max-width: 100% !important; max-height: 100px !important; height: auto !important; width: auto !important; }
        nav svg, header svg, [class*="logo"] svg, [class*="brand"] svg { max-height: 40px !important; }
        img { max-width: 100% !important; height: auto !important; }
        img[style*="width"] { max-width: 100% !important; }
        
        /* FORCE SINGLE COLUMN */
        [style*="grid"], [style*="Grid"] { grid-template-columns: 1fr !important; gap: 20px !important; }
        [style*="display: flex"][style*="gap"] { flex-wrap: wrap !important; }
        [style*="gap: 64"], [style*="gap: 72"], [style*="gap: 80"], [style*="gap: 96"] {
          flex-direction: column !important; gap: 24px !important;
        }
        
        [style*="display: flex"] > [style*="flex: 1"],
        [style*="display: flex"] > [style*="width: 50%"],
        [style*="display: flex"] > [style*="maxWidth: 620"],
        [style*="display: flex"] > [style*="maxWidth: 500"],
        [style*="display: flex"] > [style*="maxWidth: 600"] {
          width: 100% !important; max-width: 100% !important; flex: 1 1 100% !important;
        }
        
        [style*="max-width: 620"], [style*="maxWidth: 620"],
        [style*="max-width: 720"], [style*="maxWidth: 720"],
        [style*="max-width: 500"], [style*="maxWidth: 500"],
        [style*="max-width: 420"], [style*="maxWidth: 420"] {
          max-width: 100% !important; width: 100% !important;
        }
        
        [style*="max-width: 1200"], [style*="maxWidth: 1200"],
        [style*="max-width: 1100"], [style*="maxWidth: 1100"],
        [style*="max-width: 1000"], [style*="maxWidth: 1000"] {
          max-width: 100% !important;
        }
        
        section { padding-left: 20px !important; padding-right: 20px !important; }
        [style*="padding: 120"], [style*="padding: 96"], [style*="padding: 80"] { padding: 40px 20px !important; }
        [style*="padding: 72"], [style*="padding: 64"] { padding: 32px 20px !important; }
        [style*="padding-left: 64"], [style*="paddingLeft: 64"], [style*="padding-left: 48"], [style*="paddingLeft: 48"] { padding-left: 20px !important; }
        [style*="padding-right: 64"], [style*="paddingRight: 64"], [style*="padding-right: 48"], [style*="paddingRight: 48"] { padding-right: 20px !important; }
        
        blockquote, article, .prose, [class*="chapter"], [class*="story"] {
          max-width: 100% !important; width: 100% !important; margin-left: 0 !important; margin-right: 0 !important;
        }
        
        [style*="DM Mono"], [style*="fontFamily: 'DM Mono'"] {
          font-size: clamp(10px, 2.5vw, 13px) !important; letter-spacing: 0.15em !important;
        }
        
        .cta, .cta-ghost, [class*="cta"] {
          padding: 14px 24px !important; font-size: 12px !important; display: inline-flex !important; white-space: nowrap !important;
        }
        
        [style*="display: flex"][style*="gap: 16"] { flex-wrap: wrap !important; justify-content: center !important; }
        
        section { margin-bottom: 40px !important; }
        section[style*="padding"] { padding-top: 40px !important; padding-bottom: 40px !important; }
        
        [style*="position: absolute"] { max-width: 100vw !important; }
        [style*="min-height: 100vh"] { min-height: auto !important; padding: 40px 20px !important; }
      }
      
      @media (max-width: 380px) {
        h1, h1 * { font-size: clamp(28px, 8vw, 44px) !important; }
        h2, h2 * { font-size: clamp(22px, 6vw, 32px) !important; }
        p { font-size: 15px !important; }
        section { padding-left: 16px !important; padding-right: 16px !important; }
      }
      
      @media (min-width: 769px) and (max-width: 1024px) {
        h1, h1 * { font-size: clamp(48px, 8vw, 72px) !important; }
      }
      
      html { scroll-behavior: smooth; }
      button, nav { -webkit-user-select: none; user-select: none; }
    </style>
  </head>
  <body style="margin:0;background:#080C08;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
